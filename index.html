<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Azhagu Hotel - Order Food</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --azh-primary: #b7410e;
            --azh-deep: #8b2c0d;
            --azh-gold: #e6b422;
            --azh-cream: #fff9ef;
            --azh-green: #2a7f49;
            --azh-dark: #2c1a0f;
            --azh-card: #ffffff;
            --azh-border: #f0e2cf;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--azh-cream); color: var(--azh-dark); overflow-x: hidden; }
        .app-nav { display: flex; background: var(--azh-dark); padding: 0 16px; gap: 4px; position: sticky; top: 0; z-index: 200; flex-wrap: wrap; }
        .nt { padding: 14px 18px; font-size: 13px; font-weight: 600; color: rgba(255,248,235,0.7); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s ease; }
        .nt.active { color: var(--azh-gold); border-bottom-color: var(--azh-gold); }
        .view { display: none; min-height: 100vh; flex-direction: column; }
        .view.active { display: flex; }
        .hero { background: linear-gradient(135deg, var(--azh-primary) 0%, var(--azh-deep) 100%); padding: 20px 20px 28px; color: white; position: relative; overflow: hidden; }
        .hero::before { content: "🍛"; position: absolute; right: -20px; bottom: -20px; font-size: 100px; opacity: 0.1; }
        .hero-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; position: relative; z-index: 2; }
        .logo-box { width: 50px; height: 50px; border-radius: 20px; background: var(--azh-gold); display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .logo-text h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 800; }
        .logo-text p { font-size: 11px; opacity: 0.8; }
        .welcome-name { margin-left: auto; background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .live-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border-radius: 40px; padding: 5px 12px; font-size: 11px; width: fit-content; }
        .ld { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .offer-banner { background: var(--azh-gold); color: var(--azh-dark); padding: 8px 16px; text-align: center; font-size: 12px; font-weight: 600; }
        .search-bar { padding: 12px 16px; background: white; border-bottom: 1px solid var(--azh-border); }
        .search-input { width: 100%; padding: 12px 16px; border: 2px solid var(--azh-border); border-radius: 50px; font-size: 14px; font-family: inherit; transition: all 0.2s; }
        .search-input:focus { outline: none; border-color: var(--azh-primary); }
        .fbar { display: flex; gap: 10px; padding: 12px 16px; overflow-x: auto; background: white; border-bottom: 1px solid var(--azh-border); position: sticky; top: 52px; z-index: 99; scrollbar-width: thin; }
        .fpill { padding: 6px 18px; border-radius: 40px; border: 1.5px solid var(--azh-border); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; background: white; color: #9b7b5c; transition: all 0.2s; }
        .fpill.active { background: var(--azh-primary); color: white; border-color: var(--azh-primary); }
        .mgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px 16px; flex: 1; }
        @media (max-width: 480px) { .mgrid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; } }
        .mc { background: var(--azh-card); border-radius: 24px; overflow: hidden; border: 1px solid var(--azh-border); transition: all 0.25s ease; position: relative; }
        .offer-tag { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; z-index: 10; }
        .mi { position: relative; width: 100%; padding-top: 75%; background: #faeedb; overflow: hidden; }
        .mi img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .mi .me { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .mb { padding: 10px 12px 14px; }
        .mn { font-size: 15px; font-weight: 700; }
        .mnote { font-size: 10px; color: #9b7b5c; margin-top: 3px; }
        .mrow { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .mprice { font-size: 16px; font-weight: 800; color: var(--azh-primary); }
        .original-price { font-size: 12px; text-decoration: line-through; color: #999; margin-right: 5px; }
        .qw { display: flex; align-items: center; gap: 6px; background: #fef6ed; padding: 2px 6px 2px 4px; border-radius: 40px; }
        .qb { width: 26px; height: 26px; border-radius: 50%; border: none; font-size: 16px; font-weight: 600; cursor: pointer; background: white; transition: all 0.15s; }
        .qb.plus { background: var(--azh-primary); color: white; }
        .qb.minus { border: 1px solid #e2cfb5; }
        .unavailable { opacity: 0.6; filter: grayscale(0.3); }
        .unavailable-badge { position: absolute; top: 10px; left: 10px; background: #999; color: white; font-size: 10px; padding: 3px 8px; border-radius: 20px; }
        .cbar { background: var(--azh-dark); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; bottom: 0; z-index: 150; }
        .ct { font-size: 22px; font-weight: 800; }
        .pbtn { background: var(--azh-gold); color: var(--azh-dark); border: none; border-radius: 40px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .pbtn:disabled { background: #9b7b5c; opacity: 0.5; cursor: not-allowed; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(44,26,15,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-card { background: white; border-radius: 32px; padding: 32px; width: 90%; max-width: 400px; text-align: center; animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-card h3 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--azh-primary); margin-bottom: 8px; }
        .modal-input { width: 100%; padding: 14px 18px; border: 2px solid var(--azh-border); border-radius: 60px; font-size: 16px; margin-bottom: 20px; font-family: inherit; text-align: center; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #2c1a0f; color: #ffecb3; padding: 10px 20px; border-radius: 40px; font-size: 12px; opacity: 0; transition: opacity 0.2s; z-index: 999; pointer-events: none; white-space: nowrap; }
        .toast.show { opacity: 1; }
        @media (max-width: 480px) { .toast { white-space: normal; max-width: 85%; } }
        .order-history-list { padding: 16px; }
        .history-item { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--azh-border); cursor: pointer; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; }
        .history-id { font-weight: 800; color: var(--azh-primary); font-size: 13px; }
        .history-date { font-size: 11px; color: #9b7b5c; }
        .history-total { font-weight: 800; font-size: 14px; color: var(--azh-green); }
    </style>
</head>
<body>

<nav class="app-nav">
    <div class="nt active" data-view="customer">🍛 Menu</div>
    <div class="nt" data-view="orders">📜 My Orders</div>
</nav>

<div class="view active" id="view-customer">
    <div class="hero">
        <div class="hero-row">
            <div class="logo-box">✨</div>
            <div class="logo-text"><h1>Azhagu Hotel</h1><p>Pure Veg · Authentic Taste</p></div>
            <div class="welcome-name" id="welcomeNameBtn" onclick="openNameModal()">👤 Tap to add name</div>
        </div>
        <div class="live-pill"><div class="ld"></div> UPI: azhagumani20-3@okicici</div>
    </div>
    <div id="offerBanner" class="offer-banner" style="display:none;"></div>
    <div class="search-bar"><input type="text" class="search-input" id="searchInput" placeholder="🔍 Search dishes..."></div>
    <div class="fbar" id="filterBar"><div class="fpill active" data-cat="all">🍽️ All</div></div>
    <div class="mgrid" id="menuGrid"><div style="text-align:center; padding:40px;">Loading menu...</div></div>
    <div class="cbar"><div><div class="cl" id="cartLbl">0 items</div><div class="ct" id="cartTotal">₹0</div></div><button class="pbtn" id="placeBtn" disabled onclick="proceedToPayment()">Order →</button></div>
</div>

<div class="view" id="view-orders">
    <div class="hero" style="background: linear-gradient(135deg, #2c1a0f, #3f2618);">
        <div class="hero-row"><div class="logo-box">📜</div><div class="logo-text"><h1>My Orders</h1><p>View bills & history</p></div></div>
    </div>
    <div id="orderHistoryList" class="order-history-list"></div>
</div>

<div id="nameModal" class="modal-overlay"><div class="modal-card"><h3>👤 Welcome!</h3><p>Please enter your name</p><input type="text" id="customerNameInput" class="modal-input" placeholder="Your name"><button class="pbtn" onclick="saveCustomerName()" style="width:100%;">Continue →</button></div></div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
    const UPI_ID = 'azhagumani20-3@okicici';
    const UPI_NAME = 'Azhagu Hotel';
    const GSTIN = '33AAACA1234E1ZQ';
    
    let menuItems = [];
    let activeOffers = [];
    let cart = {};
    let customerName = localStorage.getItem('customerName') || '';
    let currentFilter = 'all';
    let searchQuery = '';
    let currentBillOrder = null;
    let orders = JSON.parse(localStorage.getItem('azhagu_orders') || '[]');
    let customerOrders = JSON.parse(localStorage.getItem('azhagu_customer_orders') || '[]');
    let orderCounter = Math.max(orders.length, customerOrders.length, 1);
    
    let gstRate = 5;
    let gstEnabled = true;
    
    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = isError ? '#c0392b' : '#2c1a0f';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    function calculateGST(subtotal) {
        if (!gstEnabled) return { gstAmount: 0, total: subtotal, cgst: 0, sgst: 0 };
        const gstAmount = (subtotal * gstRate) / 100;
        return { gstAmount, total: subtotal + gstAmount, cgst: gstAmount/2, sgst: gstAmount/2 };
    }
    
    function getDiscountedPrice(originalPrice, itemId) {
        let finalPrice = originalPrice;
        for (const offer of activeOffers) {
            if (offer.active && offer.type === 'percentage' && (offer.itemId === itemId || offer.itemId === 'all')) {
                finalPrice = originalPrice * (1 - offer.value / 100);
            }
        }
        return Math.round(finalPrice);
    }
    
    function getCartTotal() {
        let subtotal = 0;
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuItems.find(i => i.id == id);
            if (item && item.available) {
                const price = getDiscountedPrice(item.price, item.id);
                subtotal += price * qty;
            }
        }
        return { subtotal, ...calculateGST(subtotal) };
    }
    
    function renderMenu() {
        const grid = document.getElementById('menuGrid');
        let filtered = menuItems.filter(i => i.approved && i.available);
        
        if (currentFilter !== 'all') filtered = filtered.filter(i => i.category === currentFilter);
        if (searchQuery) filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));
        
        if (filtered.length === 0) { grid.innerHTML = '<div style="text-align:center; padding:40px;">No items available</div>'; return; }
        
        grid.innerHTML = filtered.map(item => {
            const qty = cart[item.id] || 0;
            const originalPrice = item.price;
            const discountedPrice = getDiscountedPrice(originalPrice, item.id);
            const hasOffer = discountedPrice < originalPrice;
            const imgHtml = item.img ? `<img src="${item.img}">` : `<div class="me">${item.emoji}</div>`;
            
            return `<div class="mc">
                ${hasOffer ? `<div class="offer-tag">${Math.round((1 - discountedPrice/originalPrice)*100)}% OFF</div>` : ''}
                <div class="mi">${imgHtml}</div>
                <div class="mb">
                    <div class="mn">${item.name}</div>
                    <div class="mrow">
                        <div class="mprice">${hasOffer ? `<span class="original-price">₹${originalPrice}</span> ₹${discountedPrice}` : `₹${originalPrice}`}</div>
                        <div class="qw">
                            ${qty > 0 ? `<button class="qb minus" onclick="updateCart(${item.id}, -1)">−</button><span class="qn">${qty}</span>` : ''}
                            <button class="qb plus" onclick="updateCart(${item.id}, 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }
    
    function updateCart(id, delta) {
        const item = menuItems.find(i => i.id == id);
        if (!item || !item.available) return;
        const newQty = Math.max(0, (cart[id] || 0) + delta);
        if (newQty === 0) delete cart[id];
        else cart[id] = newQty;
        renderMenu();
        updateCartBar();
    }
    
    function updateCartBar() {
        const { total } = getCartTotal();
        let count = Object.values(cart).reduce((a,b) => a+b, 0);
        document.getElementById('cartTotal').innerHTML = '₹' + total.toFixed(2);
        document.getElementById('cartLbl').innerText = count + (count === 1 ? ' item' : ' items');
        document.getElementById('placeBtn').disabled = count === 0;
    }
    
    function openNameModal() { if (!customerName) document.getElementById('nameModal').classList.add('open'); }
    
    function saveCustomerName() {
        const name = document.getElementById('customerNameInput').value.trim();
        if (!name) { showToast('Please enter your name', true); return; }
        customerName = name;
        localStorage.setItem('customerName', customerName);
        document.getElementById('welcomeNameBtn').innerHTML = `👤 ${customerName.substring(0, 15)}`;
        document.getElementById('nameModal').classList.remove('open');
        showToast(`Welcome ${customerName}!`);
    }
    
    function proceedToPayment() {
        if (Object.keys(cart).length === 0) return;
        if (!customerName) { openNameModal(); return; }
        showToast('Proceed to payment - Order will be confirmed');
        confirmOrderDirect();
    }
    
    async function confirmOrderDirect() {
        let subtotal = 0, itemsList = [];
        for (const [id, qty] of Object.entries(cart)) {
            const item = menuItems.find(i => i.id == parseInt(id));
            if (item && item.available) {
                const price = getDiscountedPrice(item.price, item.id);
                itemsList.push({ name: item.name, qty, price: price, total: price * qty });
                subtotal += price * qty;
            }
        }
        
        const { gstAmount, total, cgst, sgst } = calculateGST(subtotal);
        const orderId = `ORD-${String(orderCounter++).padStart(3,'0')}`;
        const now = new Date();
        
        const order = {
            id: orderId, customerName: customerName, items: itemsList,
            subtotal: subtotal, gstRate: gstRate, gstAmount: gstAmount,
            cgst: cgst, sgst: sgst, total: total, status: 'pending',
            paidStatus: 'Paid', payMethod: 'UPI',
            time: now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
            date: now.toLocaleDateString('en-IN'), timestamp: now.toISOString(),
            gstin: GSTIN, hotelName: 'Azhagu Hotel', upiId: UPI_ID
        };
        
        try {
            await db.collection('orders').add(order);
            orders.unshift(order); customerOrders.unshift(order);
            localStorage.setItem('azhagu_orders', JSON.stringify(orders));
            localStorage.setItem('azhagu_customer_orders', JSON.stringify(customerOrders));
            cart = {}; renderMenu(); updateCartBar();
            showToast(`✅ Order ${order.id} placed!`);
        } catch(e) { showToast('Order failed', true); }
    }
    
    function loadOrderHistory() {
        const userOrders = customerOrders.filter(o => o.customerName === customerName);
        const container = document.getElementById('orderHistoryList');
        if (userOrders.length === 0) { container.innerHTML = '<div style="text-align:center; padding:50px;">No orders yet</div>'; return; }
        container.innerHTML = userOrders.map(order => `<div class="history-item"><div class="history-header"><span class="history-id">${order.id}</span><span class="history-date">${order.date}</span></div><div>${order.items.map(l => `${l.name}×${l.qty}`).join(', ')}</div><div class="history-total">₹${order.total}</div></div>`).join('');
    }
    
    // Load data from Firebase
    async function loadMenuAndOffers() {
        try {
            const menuSnapshot = await db.collection('menu').get();
            if (!menuSnapshot.empty) {
                menuItems = [];
                menuSnapshot.forEach(doc => menuItems.push({ id: doc.id, ...doc.data() }));
            } else {
                // Default menu if empty
                menuItems = [
                    { id: "1", name: 'Ghee Roast Dosa', price: 65, category: 'tiffin', emoji: '🥞', approved: true, available: true },
                    { id: "2", name: 'Mini Idly', price: 30, category: 'tiffin', emoji: '🍚', approved: true, available: true },
                    { id: "3", name: 'Masala Dosa', price: 70, category: 'tiffin', emoji: '🥞', approved: true, available: true },
                    { id: "4", name: 'Filter Coffee', price: 22, category: 'drinks', emoji: '☕', approved: true, available: true },
                    { id: "5", name: 'Badam Milk', price: 35, category: 'drinks', emoji: '🥛', approved: true, available: true }
                ];
            }
            
            const offersSnapshot = await db.collection('offers').get();
            activeOffers = [];
            offersSnapshot.forEach(doc => { const data = doc.data(); if (data.active) activeOffers.push(data); });
            
            const settingsSnapshot = await db.collection('settings').doc('gst').get();
            if (settingsSnapshot.exists) {
                gstRate = settingsSnapshot.data().rate || 5;
                gstEnabled = settingsSnapshot.data().enabled !== false;
            }
            
            renderMenu();
            if (activeOffers.length > 0) {
                const banner = document.getElementById('offerBanner');
                banner.innerHTML = `🎉 ${activeOffers.map(o => o.title || `${o.value}% OFF`).join(' | ')} 🎉`;
                banner.style.display = 'block';
            }
        } catch(e) { console.error('Error loading:', e); }
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value; renderMenu(); });
    document.querySelectorAll('.nt').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.nt').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(`view-${tab.dataset.view}`).classList.add('active');
            if (tab.dataset.view === 'orders') loadOrderHistory();
        });
    });
    
    if (customerName) document.getElementById('welcomeNameBtn').innerHTML = `👤 ${customerName.substring(0, 15)}`;
    else setTimeout(() => openNameModal(), 500);
    
    loadMenuAndOffers();
    updateCartBar();
</script>
</body>
</html>
