<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azhagu Unavagam - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f5efe6; min-height: 100vh; }
        :root {
            --primary: #b7410e;
            --deep: #8b2c0d;
            --gold: #e6b422;
            --green: #2a7f49;
            --dark: #2c1a0f;
            --border: #f0e2cf;
            --blue: #2196f3;
            --orange: #ff9800;
        }
        
        .login-overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, rgba(44,26,15,0.98), rgba(44,26,15,0.95));
            z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .login-card {
            background: white; border-radius: 48px; padding: 48px 40px; width: 90%; max-width: 420px; text-align: center;
        }
        .login-card h2 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--primary); margin-bottom: 8px; }
        .login-input-group { margin-bottom: 20px; text-align: left; }
        .login-input-group label { display: block; font-size: 12px; font-weight: 600; color: #9b7b5c; margin-bottom: 5px; text-transform: uppercase; }
        .login-input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 60px; font-size: 15px; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--deep)); color: white; border: none; border-radius: 60px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 12px; }
        
        .admin-content { display: none; }
        .admin-header {
            background: linear-gradient(135deg, var(--dark) 0%, #3f2618 100%);
            padding: 20px 32px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .admin-header h1 { font-family: 'Playfair Display', serif; font-size: 26px; }
        .admin-header h1 span { color: var(--gold); }
        .header-right { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .datetime { background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 40px; font-size: 13px; font-family: monospace; }
        .live-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 40px; font-size: 12px; }
        .pulse-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .header-btn { background: rgba(255,255,255,0.15); border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; font-size: 13px; }
        .header-btn.logout { background: #c0392b; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 24px 32px; }
        .stat-card { background: white; border-radius: 28px; padding: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 32px; font-weight: 800; color: var(--primary); }
        
        .orders-container { padding: 0 32px 32px; display: flex; flex-direction: column; gap: 16px; max-height: 60vh; overflow-y: auto; }
        .order-card { background: white; border-radius: 24px; padding: 20px; border-left: 6px solid var(--orange); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .order-card.status-booked { border-left-color: var(--orange); }
        .order-card.status-prepared { border-left-color: var(--blue); }
        .order-card.status-ready { border-left-color: var(--green); }
        .order-card.status-delivered { border-left-color: #95a5a6; opacity: 0.8; }
        .order-header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 12px; }
        .order-id { font-weight: 800; font-size: 16px; }
        .badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-status { background: #fff3e0; color: var(--orange); }
        .badge-type { background: #e8e8e8; color: #666; }
        .order-items { background: #faf6f0; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 13px; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-top: 12px; }
        .order-total { font-size: 22px; font-weight: 800; color: var(--primary); }
        .status-buttons { display: flex; gap: 8px; }
        .status-btn { padding: 6px 14px; border-radius: 30px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-booked { background: var(--orange); color: white; }
        .btn-prepared { background: var(--blue); color: white; }
        .btn-ready { background: var(--green); color: white; }
        .btn-delivered { background: #95a5a6; color: white; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #ffecb3; padding: 12px 28px; border-radius: 60px; font-size: 13px; z-index: 1200; display: none; }
        
        @media (max-width: 700px) {
            .stats-grid { padding: 16px; gap: 12px; }
            .orders-container { padding: 0 16px 20px; }
            .admin-header { padding: 16px 20px; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginModal" class="login-overlay">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <div class="hotel-name">🍛 Azhagu Unavagam</div>
        <div class="login-input-group"><label>📧 Email</label><input type="email" id="loginEmail" class="login-input" value="azhagumani20@gmail.com"></div>
        <div class="login-input-group"><label>🔒 Password</label><input type="password" id="loginPassword" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') checkLogin()"></div>
        <button class="login-btn" onclick="checkLogin()">Login →</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="adminContent" class="admin-content">
    <div class="admin-header">
        <div><h1>🍛 Azhagu <span>Unavagam</span></h1><p style="font-size:12px;">Order Management</p></div>
        <div class="header-right">
            <div class="datetime" id="datetimeDisplay"></div>
            <div class="live-badge"><div class="pulse-dot"></div><span>Live</span></div>
            <button class="header-btn logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><div>📊 Total Orders</div><div class="stat-number" id="totalOrders">0</div></div>
        <div class="stat-card"><div>📖 Booked</div><div class="stat-number" id="bookedOrders">0</div></div>
        <div class="stat-card"><div>👨‍🍳 Prepared</div><div class="stat-number" id="preparedOrders">0</div></div>
        <div class="stat-card"><div>✅ Ready</div><div class="stat-number" id="readyOrders">0</div></div>
        <div class="stat-card"><div>🚚 Delivered</div><div class="stat-number" id="deliveredOrders">0</div></div>
        <div class="stat-card"><div>💰 Revenue</div><div class="stat-number" id="totalRevenue">₹0</div></div>
    </div>
    
    <div id="ordersContainer" class="orders-container"></div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
    let unsubscribeOrders = null;
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function playSound() {
        try { const audio = new (window.AudioContext || window.webkitAudioContext)(); const osc = audio.createOscillator(); const gain = audio.createGain(); osc.connect(gain); gain.connect(audio.destination); osc.frequency.value = 880; gain.gain.value = 0.2; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.5); osc.stop(audio.currentTime + 0.5); } catch(e) {}
    }
    
    function updateDateTime() { document.getElementById('datetimeDisplay').innerHTML = new Date().toLocaleString('en-IN'); }
    setInterval(updateDateTime, 1000); updateDateTime();
    
    async function checkLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            startListening();
            showToast(`Welcome ${email}`);
        } catch(error) { document.getElementById('loginError').innerHTML = '❌ ' + error.message; }
    }
    
    async function logout() {
        if (unsubscribeOrders) unsubscribeOrders();
        await auth.signOut();
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('loginModal').style.display = 'flex';
        showToast('Logged out');
    }
    
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            startListening();
        }
    });
    
    function getStatusText(status) {
        const map = { 'booked': '📖 Booked', 'prepared': '👨‍🍳 Prepared', 'ready': '✅ Ready', 'delivered': '🚚 Delivered' };
        return map[status] || status;
    }
    
    function getOrderTypeText(type) {
        const map = { 'dinein': '🏠 Dine In', 'pickup': '🚗 Pickup', 'parcel': '📦 Parcel' };
        return map[type] || type;
    }
    
    function startListening() {
        if (unsubscribeOrders) unsubscribeOrders();
        unsubscribeOrders = db.collection('orders').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
            const orders = [];
            snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
            renderOrders(orders);
            updateStats(orders);
            if (window.lastOrderCount && orders.length > window.lastOrderCount) { playSound(); showToast(`🔔 New order!`); }
            window.lastOrderCount = orders.length;
        });
    }
    
    function renderOrders(orders) {
        const container = document.getElementById('ordersContainer');
        if (orders.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px;">No orders</div>'; return; }
        container.innerHTML = orders.map(order => `
            <div class="order-card status-${order.status || 'booked'}">
                <div class="order-header">
                    <div class="order-id">${order.id}</div>
                    <div class="badges">
                        <span class="badge badge-status">${getStatusText(order.status || 'booked')}</span>
                        <span class="badge badge-type">${getOrderTypeText(order.orderType || 'dinein')}</span>
                        <span class="badge">💰 ${order.payMethod || 'UPI'}</span>
                    </div>
                </div>
                <div><strong>👤 ${order.customerName || 'Guest'}</strong> | 🕐 ${order.time || 'Just now'}</div>
                <div class="order-items">${order.items ? order.items.map(i => `${i.name} × ${i.qty} — ₹${i.price}`).join('<br>') : ''}</div>
                <div class="order-footer">
                    <div class="order-total">₹${(order.total || 0).toFixed(2)}</div>
                    <div class="status-buttons">
                        ${order.status !== 'delivered' ? `
                            <button class="status-btn btn-booked" onclick="updateStatus('${order.id}', 'booked')" ${order.status === 'booked' ? 'disabled style="opacity:0.5;"' : ''}>📖 Booked</button>
                            <button class="status-btn btn-prepared" onclick="updateStatus('${order.id}', 'prepared')" ${order.status === 'prepared' ? 'disabled style="opacity:0.5;"' : ''}>👨‍🍳 Prepared</button>
                            <button class="status-btn btn-ready" onclick="updateStatus('${order.id}', 'ready')" ${order.status === 'ready' ? 'disabled style="opacity:0.5;"' : ''}>✅ Ready</button>
                            <button class="status-btn btn-delivered" onclick="updateStatus('${order.id}', 'delivered')">🚚 Delivered</button>
                        ` : '<span style="color:#888;">✅ Completed</span>'}
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    async function updateStatus(orderId, newStatus) {
        await db.collection('orders').doc(orderId).update({ status: newStatus });
        showToast(`Order ${newStatus}`);
        if (newStatus === 'ready' || newStatus === 'prepared') playSound();
    }
    
    function updateStats(orders) {
        document.getElementById('totalOrders').innerText = orders.length;
        document.getElementById('bookedOrders').innerText = orders.filter(o => o.status === 'booked').length;
        document.getElementById('preparedOrders').innerText = orders.filter(o => o.status === 'prepared').length;
        document.getElementById('readyOrders').innerText = orders.filter(o => o.status === 'ready').length;
        document.getElementById('deliveredOrders').innerText = orders.filter(o => o.status === 'delivered').length;
        document.getElementById('totalRevenue').innerHTML = '₹' + orders.filter(o => o.status === 'delivered').reduce((s, o) => s + (o.total || 0), 0).toFixed(2);
    }
</script>
</body>
</html>
