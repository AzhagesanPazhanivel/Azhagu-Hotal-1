<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azhagu Hotel - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f5efe6; min-height: 100vh; }
        :root {
            --azh-primary: #b7410e;
            --azh-deep: #8b2c0d;
            --azh-gold: #e6b422;
            --azh-green: #2a7f49;
            --azh-dark: #2c1a0f;
            --azh-border: #f0e2cf;
        }
        
        .login-overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, rgba(44,26,15,0.98), rgba(44,26,15,0.95));
            z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .login-card {
            background: white; border-radius: 48px; padding: 48px 40px; width: 90%; max-width: 420px; text-align: center;
        }
        .login-card h2 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--azh-primary); margin-bottom: 8px; }
        .login-input-group { margin-bottom: 20px; text-align: left; }
        .login-input-group label { display: block; font-size: 12px; font-weight: 600; color: #9b7b5c; margin-bottom: 5px; text-transform: uppercase; }
        .login-input { width: 100%; padding: 14px 18px; border: 2px solid var(--azh-border); border-radius: 60px; font-size: 15px; }
        .login-input:focus { outline: none; border-color: var(--azh-primary); }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--azh-primary), var(--azh-deep)); color: white; border: none; border-radius: 60px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 12px; }
        
        .admin-content { display: none; }
        .admin-header {
            background: linear-gradient(135deg, var(--azh-dark) 0%, #3f2618 100%);
            padding: 20px 32px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .admin-header h1 { font-family: 'Playfair Display', serif; font-size: 26px; }
        .admin-header h1 span { color: var(--azh-gold); }
        .header-right { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .datetime { background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 40px; font-size: 13px; font-family: monospace; }
        .live-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 40px; font-size: 12px; }
        .pulse-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .header-btn { background: rgba(255,255,255,0.15); border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; font-size: 13px; }
        .header-btn:hover { background: rgba(255,255,255,0.25); }
        .header-btn.logout { background: #c0392b; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 24px 32px; }
        .stat-card { background: white; border-radius: 28px; padding: 20px; text-align: center; border: 1px solid var(--azh-border); }
        .stat-number { font-size: 32px; font-weight: 800; color: var(--azh-primary); }
        
        .orders-section { padding: 0 32px 32px; }
        .orders-container { display: flex; flex-direction: column; gap: 16px; max-height: 55vh; overflow-y: auto; }
        .order-card { background: white; border-radius: 20px; padding: 18px; border-left: 6px solid var(--azh-primary); }
        .order-card.ready { border-left-color: #f39c12; }
        .order-card.done { border-left-color: #95a5a6; opacity: 0.8; }
        .order-header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 12px; }
        .order-id { font-weight: 800; }
        .order-items { background: #faf6f0; padding: 12px; border-radius: 16px; margin: 10px 0; font-size: 13px; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-top: 12px; }
        .action-btn { background: var(--azh-primary); color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .empty-state { text-align: center; padding: 50px; color: #9b7b5c; background: white; border-radius: 20px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--azh-dark); color: #ffecb3; padding: 12px 28px; border-radius: 60px; font-size: 13px; z-index: 1200; display: none; }
        
        @media (max-width: 700px) {
            .stats-grid { padding: 16px; gap: 12px; }
            .orders-section { padding: 0 16px 20px; }
            .admin-header { padding: 16px 20px; flex-direction: column; text-align: center; }
            .header-right { justify-content: center; }
        }
        
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1100; display: flex; align-items: center; justify-content: center; display: none;
        }
        .modal-card { background: white; border-radius: 32px; padding: 32px; width: 90%; max-width: 380px; }
        .modal-card h3 { font-size: 24px; margin-bottom: 20px; color: var(--azh-primary); }
        .modal-card input { width: 100%; padding: 12px 16px; border: 2px solid var(--azh-border); border-radius: 60px; margin-bottom: 15px; }
        .modal-card button { width: 100%; padding: 12px; background: var(--azh-primary); color: white; border: none; border-radius: 60px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .modal-card .cancel-btn { background: #ccc; color: #333; }
    </style>
</head>
<body>

<div id="loginModal" class="login-overlay">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <div class="hotel-name">🍛 Azhagu Hotel</div>
        <div class="login-input-group"><label>👤 Username</label><input type="text" id="loginUsername" class="login-input" placeholder="Enter username"></div>
        <div class="login-input-group"><label>🔒 Password</label><input type="password" id="loginPassword" class="login-input" placeholder="Enter password" onkeypress="if(event.key==='Enter') checkLogin()"></div>
        <button class="login-btn" onclick="checkLogin()">Login →</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="changePwdModal" class="modal-overlay">
    <div class="modal-card">
        <h3>🔑 Change Password</h3>
        <input type="text" id="currentUsername" placeholder="Current Username">
        <input type="password" id="currentPassword" placeholder="Current Password">
        <input type="password" id="newPassword" placeholder="New Password (min 4 chars)">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <button onclick="changePassword()">Update</button>
        <button class="cancel-btn" onclick="closeChangePwdModal()">Cancel</button>
    </div>
</div>

<div id="adminContent" class="admin-content">
    <div class="admin-header">
        <div><h1>🍛 Azhagu <span>Admin</span></h1><p style="font-size:12px;">Order Management</p></div>
        <div class="header-right">
            <div class="datetime" id="datetimeDisplay"></div>
            <div class="live-badge"><div class="pulse-dot"></div><span>Live</span></div>
            <button class="header-btn" onclick="openChangePwdModal()">🔐 Change Password</button>
            <button class="header-btn logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><div>📊 Total Orders</div><div class="stat-number" id="totalOrders">0</div></div>
        <div class="stat-card"><div>⏳ Pending</div><div class="stat-number" id="pendingOrders">0</div></div>
        <div class="stat-card"><div>🔥 Ready</div><div class="stat-number" id="readyOrders">0</div></div>
        <div class="stat-card"><div>✅ Completed</div><div class="stat-number" id="completedOrders">0</div></div>
        <div class="stat-card"><div>💰 Revenue</div><div class="stat-number" id="totalRevenue">₹0</div></div>
    </div>
    
    <div class="orders-section">
        <div id="ordersContainer" class="orders-container"><div class="empty-state">📭 Loading orders...</div></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLrk_nmC2V0NvRKfhHdFzBi647xiuF1y0",
        authDomain: "azhagu-hotel.firebaseapp.com",
        projectId: "azhagu-hotel",
        storageBucket: "azhagu-hotel.firebasestorage.app",
        messagingSenderId: "357401937469",
        appId: "1:357401937469:web:a7a55fc0e59a5059660c54"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const ADMIN_CRED_KEY = 'azhagu_admin_credentials';
    const DEFAULT_USERNAME = 'admin';
    const DEFAULT_PASSWORD = 'admin123';
    
    if (!localStorage.getItem(ADMIN_CRED_KEY)) {
        localStorage.setItem(ADMIN_CRED_KEY, JSON.stringify({ username: DEFAULT_USERNAME, password: DEFAULT_PASSWORD }));
    }
    
    let unsubscribeOrders = null;
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = isError ? '#c0392b' : 'var(--azh-dark)';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function playSound() {
        try {
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            osc.connect(gain);
            gain.connect(audio.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.2;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.5);
            osc.stop(audio.currentTime + 0.5);
        } catch(e) {}
    }
    
    function updateDateTime() { document.getElementById('datetimeDisplay').innerHTML = new Date().toLocaleString('en-IN'); }
    setInterval(updateDateTime, 1000);
    updateDateTime();
    
    function startListening() {
        if (unsubscribeOrders) unsubscribeOrders();
        unsubscribeOrders = db.collection('orders').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
            const orders = [];
            snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
            renderOrders(orders);
            updateStats(orders);
            if (window.lastOrderCount && orders.length > window.lastOrderCount) { playSound(); showToast(`🔔 New order!`); }
            window.lastOrderCount = orders.length;
        }, (error) => { console.error(error); document.getElementById('ordersContainer').innerHTML = '<div class="empty-state">❌ Connection error. Check Firebase rules.</div>'; });
    }
    
    function renderOrders(orders) {
        const container = document.getElementById('ordersContainer');
        if (orders.length === 0) { container.innerHTML = '<div class="empty-state">📭 No orders yet</div>'; return; }
        container.innerHTML = orders.map(order => `
            <div class="order-card ${order.status || 'pending'}">
                <div class="order-header"><div class="order-id">${order.id}</div><div>👤 ${order.customerName || 'Guest'}</div></div>
                <div class="order-items">${order.items ? order.items.map(i => `${i.name} × ${i.qty} — ₹${i.total}`).join('<br>') : ''}</div>
                <div class="order-footer">
                    <div style="font-size:20px; font-weight:800;">₹${(order.total || 0).toFixed(2)}</div>
                    <div>🕐 ${order.time || 'Just now'}</div>
                    ${order.status !== 'done' ? `<button class="action-btn" onclick="updateStatus('${order.id}', '${order.status === 'pending' ? 'ready' : 'done'}')">${order.status === 'pending' ? '✓ Mark Ready' : '✅ Complete'}</button>` : '<span style="color:#888;">✅ Done</span>'}
                </div>
            </div>
        `).join('');
    }
    
    async function updateStatus(orderId, newStatus) { await db.collection('orders').doc(orderId).update({ status: newStatus }); showToast(`Order ${newStatus}`); if (newStatus === 'ready') playSound(); }
    
    function updateStats(orders) {
        document.getElementById('totalOrders').innerText = orders.length;
        document.getElementById('pendingOrders').innerText = orders.filter(o => o.status === 'pending').length;
        document.getElementById('readyOrders').innerText = orders.filter(o => o.status === 'ready').length;
        document.getElementById('completedOrders').innerText = orders.filter(o => o.status === 'done').length;
        document.getElementById('totalRevenue').innerHTML = '₹' + orders.filter(o => o.status === 'done').reduce((s, o) => s + (o.total || 0), 0).toFixed(2);
    }
    
    function checkLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const cred = JSON.parse(localStorage.getItem(ADMIN_CRED_KEY));
        if (username === cred.username && password === cred.password) {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            startListening();
            showToast(`Welcome ${username}!`);
        } else { document.getElementById('loginError').innerHTML = '❌ Invalid!'; }
    }
    
    function logout() { if (unsubscribeOrders) unsubscribeOrders(); document.getElementById('adminContent').style.display = 'none'; document.getElementById('loginModal').style.display = 'flex'; showToast('Logged out'); }
    
    function openChangePwdModal() { document.getElementById('changePwdModal').style.display = 'flex'; }
    function closeChangePwdModal() { document.getElementById('changePwdModal').style.display = 'none'; }
    
    function changePassword() {
        const currUser = document.getElementById('currentUsername').value.trim();
        const currPass = document.getElementById('currentPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const cred = JSON.parse(localStorage.getItem(ADMIN_CRED_KEY));
        if (currUser !== cred.username || currPass !== cred.password) { showToast('Current incorrect!', true); return; }
        if (newPass.length < 4) { showToast('Min 4 chars!', true); return; }
        if (newPass !== confirmPass) { showToast('Passwords mismatch!', true); return; }
        cred.password = newPass;
        localStorage.setItem(ADMIN_CRED_KEY, JSON.stringify(cred));
        closeChangePwdModal();
        showToast('Password changed! Login again.');
        setTimeout(() => logout(), 1500);
    }
</script>
</body>
</html>
