<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azhagu Hotel – Admin Portal with GST</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --azh-primary: #b7410e;
  --azh-deep: #8b2c0d;
  --azh-gold: #e6b422;
  --azh-cream: #fff9ef;
  --azh-dark: #2c1a0f;
  --azh-card: #ffffff;
  --azh-border: #f0e2cf;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #f5efe6;
  color: #2b1e12;
}

.login-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44, 26, 15, 0.95);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.login-card {
  background: white;
  border-radius: 32px;
  padding: 40px 32px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}
.login-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--azh-primary);
}
.login-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--azh-border);
  border-radius: 60px;
  font-size: 16px;
  margin: 20px 0;
}
.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--azh-primary);
  color: white;
  border: none;
  border-radius: 60px;
  font-weight: 700;
  cursor: pointer;
}
.admin-content {
  display: none;
}
.admin-header {
  background: linear-gradient(135deg, #2c1a0f 0%, #3f2618 100%);
  padding: 24px 28px;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}
.admin-header h1 span { color: var(--azh-gold); }
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.15);
  padding: 8px 18px;
  border-radius: 40px;
}
.pulse-dot {
  width: 10px;
  height: 10px;
  background: #2ecc71;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.icon-btn, .refresh-btn, .gst-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  padding: 8px 18px;
  border-radius: 40px;
  color: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
.gst-btn {
  background: var(--azh-gold);
  color: var(--azh-dark);
}
.refresh-btn {
  background: var(--azh-primary);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 24px 28px;
}
.stat-card {
  background: white;
  border-radius: 24px;
  padding: 20px;
  border: 1px solid var(--azh-border);
}
.stat-card h3 {
  font-size: 13px;
  text-transform: uppercase;
  color: #b87a4a;
  margin-bottom: 8px;
}
.stat-number {
  font-size: 32px;
  font-weight: 800;
  color: var(--azh-primary);
}
.orders-section {
  padding: 0 28px 28px;
}
.orders-container {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.order-card {
  background: white;
  border-radius: 24px;
  padding: 20px;
  border-left: 6px solid var(--azh-gold);
}
.order-card.pending { border-left-color: var(--azh-primary); }
.order-card.ready { border-left-color: #f39c12; }
.order-card.done { border-left-color: #95a5a6; opacity: 0.7; }
.order-header {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.order-id { font-weight: 800; font-size: 18px; }
.badge {
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 11px;
  font-weight: 700;
}
.badge-pay { background: #e8f0ff; color: #2255cc; }
.order-items {
  background: #faf6f0;
  border-radius: 16px;
  padding: 14px;
  margin: 12px 0;
  font-size: 13px;
}
.order-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 12px;
}
.order-total { font-size: 22px; font-weight: 800; color: var(--azh-primary); }
.action-btn {
  background: var(--azh-primary);
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
}
.gst-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1001;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}
.gst-card {
  background: white;
  border-radius: 32px;
  padding: 32px;
  width: 90%;
  max-width: 380px;
}
.gst-card input, .gst-card select {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--azh-border);
  border-radius: 60px;
  margin: 15px 0;
  font-size: 16px;
}
.gst-card button {
  width: 100%;
  padding: 12px;
  background: var(--azh-primary);
  color: white;
  border: none;
  border-radius: 60px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #2c1a0f;
  color: #ffecb3;
  padding: 10px 20px;
  border-radius: 40px;
  z-index: 1100;
  display: none;
}
</style>
</head>
<body>

<div id="loginModal" class="login-overlay">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="loginPassword" class="login-input" placeholder="Enter password">
    <button class="login-btn" onclick="checkLogin()">Login →</button>
    <div id="loginError" style="color:red; margin-top:12px;"></div>
  </div>
</div>

<div id="adminContent" class="admin-content">
  <div class="admin-header">
    <div><h1>🍛 Azhagu <span>Admin</span></h1><p style="font-size:13px;opacity:0.7;">GST Enabled Management</p></div>
    <div class="header-buttons">
      <div class="live-badge"><div class="pulse-dot"></div><span>Live</span></div>
      <button class="gst-btn" onclick="openGSTModal()">💰 GST Settings</button>
      <button class="refresh-btn" onclick="loadOrders()">⟳ Refresh</button>
      <button class="icon-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><h3>📊 Total Orders</h3><div class="stat-number" id="totalOrders">0</div></div>
    <div class="stat-card"><h3>⏳ Pending</h3><div class="stat-number" id="pendingOrders">0</div></div>
    <div class="stat-card"><h3>✅ Completed</h3><div class="stat-number" id="completedOrders">0</div></div>
    <div class="stat-card"><h3>💰 Revenue</h3><div class="stat-number" id="totalRevenue">₹0</div></div>
  </div>

  <div class="orders-section">
    <div id="ordersContainer" class="orders-container"></div>
  </div>
</div>

<div id="gstModal" class="gst-modal">
  <div class="gst-card">
    <h3 style="color:var(--azh-primary);">💰 GST Configuration</h3>
    <label>Enable GST</label>
    <select id="gstEnabled">
      <option value="true">✅ Enabled</option>
      <option value="false">❌ Disabled</option>
    </select>
    <label>GST Rate (%)</label>
    <input type="number" id="gstRate" step="0.5" min="0" max="28" placeholder="e.g., 5, 12, 18">
    <div style="font-size:12px; color:#666;">Note: CGST & SGST will be split equally</div>
    <button onclick="saveGSTSettings()">💾 Save Settings</button>
    <button onclick="closeGSTModal()" style="background:#ccc;">Cancel</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY = 'azhagu_orders';
const PASSWORD_KEY = 'azhagu_admin_password';
const GST_RATE_KEY = 'azhagu_gst_rate';
const GST_ENABLED_KEY = 'azhagu_gst_enabled';
const DEFAULT_PASSWORD = 'admin123';

if (!localStorage.getItem(PASSWORD_KEY)) localStorage.setItem(PASSWORD_KEY, DEFAULT_PASSWORD);
if (!localStorage.getItem(GST_RATE_KEY)) localStorage.setItem(GST_RATE_KEY, '5');
if (!localStorage.getItem(GST_ENABLED_KEY)) localStorage.setItem(GST_ENABLED_KEY, 'true');

let refreshInterval = null;
let lastOrderCount = 0;

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2500);
}

function playSound() {
  try {
    const audio = new AudioContext();
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.2;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.5);
    osc.stop(audio.currentTime + 0.5);
  } catch(e) {}
}

function loadOrders() {
  const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (orders.length > lastOrderCount && lastOrderCount > 0) playSound();
  lastOrderCount = orders.length;
  
  const pending = orders.filter(o => o.status === 'pending').length;
  const completed = orders.filter(o => o.status === 'done').length;
  const revenue = orders.filter(o => o.status === 'done').reduce((s, o) => s + o.total, 0);
  
  document.getElementById('totalOrders').innerText = orders.length;
  document.getElementById('pendingOrders').innerText = pending;
  document.getElementById('completedOrders').innerText = completed;
  document.getElementById('totalRevenue').innerHTML = '₹' + revenue;
  
  const container = document.getElementById('ordersContainer');
  if (orders.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;">🍽️ No orders yet</div>';
    return;
  }
  
  container.innerHTML = orders.map((order, idx) => `
    <div class="order-card ${order.status}">
      <div class="order-header">
        <div class="order-id">${order.id}</div>
        <div class="badges">
          <span class="badge badge-pay">${order.payMethod}</span>
          <span class="badge" style="background:${order.status === 'pending' ? '#ffede3' : order.status === 'ready' ? '#fff8e0' : '#e0e0e0'}">
            ${order.status === 'pending' ? '⏳ Pending' : order.status === 'ready' ? '🔥 Ready' : '✅ Done'}
          </span>
        </div>
      </div>
      <div class="order-items">
        ${order.lines.map(l => `${l.name} × ${l.qty} — ₹${l.total}`).join('<br>')}
        ${order.gstRate > 0 ? `<br><small>GST ${order.gstRate}% (CGST:₹${order.cgst?.toFixed(2)} | SGST:₹${order.sgst?.toFixed(2)})</small>` : ''}
      </div>
      <div class="order-footer">
        <div class="order-total">₹${order.total}</div>
        <div><small>${order.date} | ${order.time}</small></div>
        ${order.status !== 'done' ? `<button class="action-btn" onclick="updateOrderStatus(${idx}, '${order.status === 'pending' ? 'ready' : 'done'}')">
          ${order.status === 'pending' ? '✓ Mark Ready' : '✅ Complete'}
        </button>` : ''}
      </div>
    </div>
  `).join('');
}

function updateOrderStatus(orderIndex, newStatus) {
  const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (orders[orderIndex]) {
    orders[orderIndex].status = newStatus;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    loadOrders();
    showToast(`Order ${orders[orderIndex].id} marked as ${newStatus}`);
  }
}

function openGSTModal() {
  document.getElementById('gstEnabled').value = localStorage.getItem(GST_ENABLED_KEY);
  document.getElementById('gstRate').value = localStorage.getItem(GST_RATE_KEY);
  document.getElementById('gstModal').style.display = 'flex';
}

function closeGSTModal() {
  document.getElementById('gstModal').style.display = 'none';
}

function saveGSTSettings() {
  const enabled = document.getElementById('gstEnabled').value === 'true';
  const rate = parseFloat(document.getElementById('gstRate').value);
  if (isNaN(rate) || rate < 0 || rate > 28) {
    showToast('❌ Please enter valid GST rate (0-28%)');
    return;
  }
  localStorage.setItem(GST_ENABLED_KEY, enabled);
  localStorage.setItem(GST_RATE_KEY, rate);
  closeGSTModal();
  showToast(`✅ GST ${enabled ? 'Enabled' : 'Disabled'} | Rate: ${rate}%`);
}

function checkLogin() {
  const pwd = document.getElementById('loginPassword').value;
  if (pwd === localStorage.getItem(PASSWORD_KEY)) {
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    startAutoRefresh();
    loadOrders();
    showToast('✅ Login successful');
  } else {
    document.getElementById('loginError').innerText = '❌ Incorrect password';
  }
}

function logout() {
  document.getElementById('adminContent').style.display = 'none';
  document.getElementById('loginModal').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
  if (refreshInterval) clearInterval(refreshInterval);
  showToast('🔒 Logged out');
}

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(loadOrders, 3000);
}

window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY && document.getElementById('adminContent').style.display === 'block') loadOrders();
});
</script>
</body>
</html>
