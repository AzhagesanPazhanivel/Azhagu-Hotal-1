<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azhagu Hotel – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --azh-primary: #b7410e;
  --azh-deep: #8b2c0d;
  --azh-gold: #e6b422;
  --azh-cream: #fff9ef;
  --azh-dark: #2c1a0f;
  --azh-border: #f0e2cf;
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
}
body { font-family: 'DM Sans', sans-serif; background: #f5efe6; }
.admin-header { background: linear-gradient(135deg, #2c1a0f 0%, #3f2618 100%); padding: 20px 28px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
.admin-header h2 { font-family: 'Playfair Display', serif; font-size: 22px; }
.live-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); border-radius: 40px; padding: 5px 12px; font-size: 11px; }
.ld { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px 28px; }
.stat-card { background: white; border-radius: 20px; padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--azh-border); }
.stat-card h4 { font-size: 11px; text-transform: uppercase; color: #9b7b5c; margin-bottom: 5px; }
.stat-number { font-size: 28px; font-weight: 800; color: var(--azh-primary); }
.orders-container { padding: 0 28px 28px; max-height: 60vh; overflow-y: auto; }
.order-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 12px; border-left: 5px solid var(--azh-primary); box-shadow: var(--shadow-sm); animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.order-card.ready { border-left-color: #f39c12; }
.order-card.done { border-left-color: #95a5a6; opacity: 0.7; }
.order-header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 10px; }
.order-id { font-weight: 800; font-size: 16px; color: var(--azh-primary); }
.customer-info { display: flex; gap: 10px; flex-wrap: wrap; }
.customer-badge { background: #f0e4d4; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.order-items { background: #faf6f0; border-radius: 12px; padding: 10px; margin: 10px 0; font-size: 12px; }
.order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-top: 10px; }
.order-total { font-size: 20px; font-weight: 800; color: var(--azh-primary); }
.status-btn { background: var(--azh-primary); color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-size: 12px; font-weight: 600; }
.status-btn:hover { background: var(--azh-deep); }
.empty-state { text-align: center; padding: 50px; color: #9b7b5c; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2c1a0f; color: #ffecb3; padding: 10px 20px; border-radius: 40px; font-size: 12px; z-index: 999; display: none; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
.refresh-btn { background: var(--azh-primary); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
<div class="admin-header">
  <h2>👑 Azhagu Admin Dashboard</h2>
  <div style="display: flex; gap: 15px; align-items: center;">
    <div class="live-pill"><div class="ld"></div> REAL-TIME: 1s</div>
    <button class="refresh-btn" onclick="loadOrders()">⟳ Refresh</button>
  </div>
</div>
<div class="stats-grid">
  <div class="stat-card"><h4>📊 Total Orders</h4><div class="stat-number" id="totalOrders">0</div></div>
  <div class="stat-card"><h4>⏳ Pending</h4><div class="stat-number" id="pendingOrders">0</div></div>
  <div class="stat-card"><h4>✅ Completed</h4><div class="stat-number" id="completedOrders">0</div></div>
  <div class="stat-card"><h4>💰 Revenue</h4><div class="stat-number" id="revenue">₹0</div></div>
</div>
<div class="orders-container" id="ordersList"><div class="empty-state">📭 Waiting for orders... Customers will appear here when they place orders.</div></div>
<div id="toast" class="toast"></div>

<script>
const STORAGE_KEY = 'azhagu_orders';
let allOrders = [];
let lastOrderCount = 0;

function loadOrders() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) { allOrders = JSON.parse(stored); } else { allOrders = []; }
  
  const pending = allOrders.filter(o => o.status === 'pending').length;
  const completed = allOrders.filter(o => o.status === 'done').length;
  const revenue = allOrders.filter(o => o.status === 'done').reduce((sum, o) => sum + o.total, 0);
  
  document.getElementById('totalOrders').innerText = allOrders.length;
  document.getElementById('pendingOrders').innerText = pending;
  document.getElementById('completedOrders').innerText = completed;
  document.getElementById('revenue').innerHTML = `₹${revenue.toFixed(2)}`;
  
  const container = document.getElementById('ordersList');
  if (allOrders.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 Waiting for orders... Customers will appear here when they place orders.</div>';
    return;
  }
  
  container.innerHTML = allOrders.map((order, idx) => {
    const statusClass = order.status === 'ready' ? 'ready' : (order.status === 'done' ? 'done' : '');
    const statusText = order.status === 'pending' ? '⏳ Pending' : (order.status === 'ready' ? '🔥 Ready' : '✅ Done');
    return `<div class="order-card ${statusClass}">
      <div class="order-header">
        <span class="order-id">📄 ${order.id}</span>
        <div class="customer-info">
          <span class="customer-badge">👤 ${order.customerName || 'Guest'}</span>
          <span class="customer-badge">📞 ${order.customerMobile ? order.customerMobile.slice(0,3) + '****' + order.customerMobile.slice(-3) : 'N/A'}</span>
        </div>
      </div>
      <div class="order-items">
        ${order.items.map(i => `<div>🍽️ ${i.name} × ${i.qty} = ₹${i.total}</div>`).join('')}
        <small style="color:#666;">GST (5%): ₹${order.gstAmount.toFixed(2)}</small>
      </div>
      <div class="order-footer">
        <span class="order-total">₹${order.total.toFixed(2)}</span>
        <span style="font-size:11px; color:#999;">🕐 ${order.time}</span>
        ${order.status !== 'done' ? `<button class="status-btn" onclick="updateOrderStatus(${idx}, '${order.status === 'pending' ? 'ready' : 'done'}')">${order.status === 'pending' ? '✓ Mark Ready' : '✅ Complete'}</button>` : '<span style="color:#95a5a6;">✅ Completed</span>'}
      </div>
    </div>`;
  }).join('');
  
  // Check for new orders
  if (allOrders.length > lastOrderCount && lastOrderCount > 0) {
    const newCount = allOrders.length - lastOrderCount;
    showToast(`🔔 ${newCount} new order${newCount > 1 ? 's' : ''} received!`, false);
  }
  lastOrderCount = allOrders.length;
}

function updateOrderStatus(index, newStatus) {
  if (allOrders[index]) {
    allOrders[index].status = newStatus;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allOrders));
    loadOrders();
    showToast(`✅ Order ${allOrders[index].id} marked as ${newStatus === 'ready' ? 'Ready' : 'Completed'}`);
  }
}

function showToast(msg, isError=false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? '#c0392b' : '#2c1a0f';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Auto-refresh every 1 second
setInterval(() => { loadOrders(); }, 1000);
loadOrders();
</script>
</body>
</html>
