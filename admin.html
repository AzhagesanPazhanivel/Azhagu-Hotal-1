<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azhagu Unavagam - Admin with UTR Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f5efe6; min-height: 100vh; }
        :root {
            --primary: #b7410e;
            --deep: #8b2c0d;
            --gold: #e6b422;
            --green: #2a7f49;
            --dark: #2c1a0f;
            --border: #f0e2cf;
            --pending: #ff9800;
            --verified: #4caf50;
            --rejected: #f44336;
        }
        
        .login-overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, rgba(44,26,15,0.98), rgba(44,26,15,0.95));
            z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .login-card {
            background: white; border-radius: 48px; padding: 48px 40px; width: 90%; max-width: 420px; text-align: center;
        }
        .login-card h2 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--primary); margin-bottom: 8px; }
        .login-input-group { margin-bottom: 20px; text-align: left; }
        .login-input-group label { display: block; font-size: 12px; font-weight: 600; color: #9b7b5c; margin-bottom: 5px; text-transform: uppercase; }
        .login-input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 60px; font-size: 15px; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--deep)); color: white; border: none; border-radius: 60px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 12px; }
        
        .admin-content { display: none; }
        .admin-header {
            background: linear-gradient(135deg, var(--dark) 0%, #3f2618 100%);
            padding: 20px 32px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .admin-header h1 { font-family: 'Playfair Display', serif; font-size: 26px; }
        .admin-header h1 span { color: var(--gold); }
        .header-right { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .datetime { background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 40px; font-size: 13px; font-family: monospace; }
        .live-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 40px; font-size: 12px; }
        .pulse-dot { width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .header-btn { background: rgba(255,255,255,0.15); border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; font-size: 13px; }
        .header-btn.logout { background: #c0392b; }
        
        .admin-tabs { display: flex; gap: 5px; padding: 20px 32px 0 32px; background: white; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; background: none; border: none; font-size: 14px; font-weight: 600; color: #9b7b5c; cursor: pointer; border-radius: 30px 30px 0 0; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-pane { display: none; padding: 24px 32px; background: white; }
        .tab-pane.active { display: block; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #faf6f0; border-radius: 28px; padding: 20px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 32px; font-weight: 800; color: var(--primary); }
        
        .order-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border-left: 6px solid var(--pending); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .order-card.verified { border-left-color: var(--verified); }
        .order-card.rejected { border-left-color: var(--rejected); opacity: 0.7; }
        .order-header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 12px; }
        .order-id { font-weight: 800; font-size: 14px; font-family: monospace; }
        .badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: #fff3e0; color: var(--pending); }
        .badge-verified { background: #e8f5e9; color: var(--verified); }
        .badge-rejected { background: #ffebee; color: var(--rejected); }
        .order-items { background: #faf6f0; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 13px; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-top: 12px; }
        .order-total { font-size: 22px; font-weight: 800; color: var(--primary); }
        .utr-box { background: #f5f5f5; padding: 8px 12px; border-radius: 12px; font-family: monospace; font-size: 12px; margin: 8px 0; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .verify-btn { background: var(--verified); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .reject-btn { background: var(--rejected); color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
        
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { background: #faf6f0; font-weight: 600; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
        .status-available { background: #e8f5e9; color: #2a7f49; }
        .status-unavailable { background: #ffebee; color: #c0392b; }
        .action-btn-sm { padding: 5px 12px; border-radius: 20px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin: 2px; }
        .btn-edit { background: #2196f3; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-toggle { background: #ff9800; color: white; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1100; display: flex; align-items: center; justify-content: center; display: none; backdrop-filter: blur(5px); }
        .modal-card { background: white; border-radius: 32px; padding: 32px; width: 90%; max-width: 450px; }
        .modal-card h3 { font-size: 24px; margin-bottom: 20px; color: var(--primary); }
        .modal-card input, .modal-card select { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 60px; margin-bottom: 15px; }
        .modal-card button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 60px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .modal-card .cancel-btn { background: #ccc; color: #333; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #ffecb3; padding: 12px 28px; border-radius: 60px; font-size: 13px; z-index: 1200; display: none; }
        
        @media (max-width: 700px) {
            .admin-tabs { padding: 15px 16px 0; }
            .tab-pane { padding: 16px; }
            .admin-header { padding: 16px 20px; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginModal" class="login-overlay">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <div class="hotel-name">🍛 Azhagu Unavagam - UTR Verification Panel</div>
        <div class="login-input-group"><label>📧 Email</label><input type="email" id="loginEmail" class="login-input" value="azhagumani20@gmail.com"></div>
        <div class="login-input-group"><label>🔒 Password</label><input type="password" id="loginPassword" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') checkLogin()"></div>
        <button class="login-btn" onclick="checkLogin()">Login →</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="adminContent" class="admin-content">
    <div class="admin-header">
        <div><h1>🍛 Azhagu <span>Unavagam</span></h1><p style="font-size:12px;">UTR Verification & Order Management</p></div>
        <div class="header-right">
            <div class="datetime" id="datetimeDisplay"></div>
            <div class="live-badge"><div class="pulse-dot"></div><span>Live</span></div>
            <button class="header-btn logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>
    
    <div class="admin-tabs">
        <button class="tab-btn active" data-tab="verification">🔐 Pending Verification</button>
        <button class="tab-btn" data-tab="orders">📋 All Orders</button>
        <button class="tab-btn" data-tab="menu">🍽️ Menu</button>
        <button class="tab-btn" data-tab="offers">🏷️ Offers</button>
    </div>
    
    <!-- PENDING VERIFICATION TAB -->
    <div id="tab-verification" class="tab-pane active">
        <div class="stats-grid">
            <div class="stat-card"><div>⏳ Pending Verification</div><div class="stat-number" id="pendingCount">0</div></div>
            <div class="stat-card"><div>✅ Verified Today</div><div class="stat-number" id="verifiedToday">0</div></div>
            <div class="stat-card"><div>💰 Pending Amount</div><div class="stat-number" id="pendingAmount">₹0</div></div>
        </div>
        <div id="verificationContainer" style="max-height: 60vh; overflow-y: auto;"></div>
    </div>
    
    <!-- ALL ORDERS TAB -->
    <div id="tab-orders" class="tab-pane">
        <div id="allOrdersContainer" style="max-height: 65vh; overflow-y: auto;"></div>
    </div>
    
    <!-- MENU TAB -->
    <div id="tab-menu" class="tab-pane">
        <button class="add-btn" onclick="openAddDishModal()">+ Add New Dish</button>
        <table class="data-table"><thead><tr><th>Dish</th><th>Price</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead><tbody id="menuTableBody"></tbody></table>
    </div>
    
    <!-- OFFERS TAB -->
    <div id="tab-offers" class="tab-pane">
        <button class="add-btn" onclick="openAddOfferModal()">+ Add New Offer</button>
        <table class="data-table"><thead><tr><th>Title</th><th>Discount</th><th>Status</th><th>Actions</th></tr></thead><tbody id="offersTableBody"></tbody></table>
    </div>
</div>

<!-- MODALS -->
<div id="dishModal" class="modal-overlay">
    <div class="modal-card">
        <h3 id="dishModalTitle">Add New Dish</h3>
        <input type="text" id="dishName" placeholder="Dish Name">
        <input type="number" id="dishPrice" placeholder="Price (₹)">
        <select id="dishCategory"><option value="tiffin">Tiffin</option><option value="drinks">Drinks</option><option value="rice">Rice</option></select>
        <input type="text" id="dishEmoji" placeholder="Emoji (e.g., 🥞)">
        <input type="hidden" id="dishId">
        <button onclick="saveDish()">Save Dish</button>
        <button class="cancel-btn" onclick="closeDishModal()">Cancel</button>
    </div>
</div>

<div id="offerModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Add Offer</h3>
        <input type="text" id="offerTitle" placeholder="Offer Title">
        <input type="number" id="offerValue" placeholder="Discount %">
        <select id="offerItem"><option value="all">All Items</option></select>
        <button onclick="saveOffer()">Save Offer</button>
        <button class="cancel-btn" onclick="closeOfferModal()">Cancel</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
    let unsubscribeOrders = null;
    let menuItems = [];
    let offers = [];
    let allOrders = [];
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    function playSound() {
        try { const audio = new (window.AudioContext || window.webkitAudioContext)(); const osc = audio.createOscillator(); const gain = audio.createGain(); osc.connect(gain); gain.connect(audio.destination); osc.frequency.value = 880; gain.gain.value = 0.2; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.5); osc.stop(audio.currentTime + 0.5); } catch(e) {}
    }
    
    function updateDateTime() { document.getElementById('datetimeDisplay').innerHTML = new Date().toLocaleString('en-IN'); }
    setInterval(updateDateTime, 1000); updateDateTime();
    
    // Authentication
    async function checkLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            startListening();
            loadMenu();
            loadOffers();
            showToast(`Welcome ${email}`);
        } catch(error) { document.getElementById('loginError').innerHTML = '❌ ' + error.message; }
    }
    
    async function logout() {
        if (unsubscribeOrders) unsubscribeOrders();
        await auth.signOut();
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('loginModal').style.display = 'flex';
        showToast('Logged out');
    }
    
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            startListening();
            loadMenu();
            loadOffers();
        }
    });
    
    // Menu Management
    async function loadMenu() {
        const snapshot = await db.collection('menu').get();
        menuItems = [];
        snapshot.forEach(doc => menuItems.push({ id: doc.id, ...doc.data() }));
        renderMenuTable();
        updateOfferItems();
    }
    
    function renderMenuTable() {
        const tbody = document.getElementById('menuTableBody');
        if (menuItems.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No items</td></tr>'; return; }
        tbody.innerHTML = menuItems.map(item => `
            <tr>
                <td>${item.emoji || '🍽️'} ${item.name}</td>
                <td>₹${item.price}</td>
                <td>${item.category === 'tiffin' ? 'Tiffin' : item.category === 'drinks' ? 'Drinks' : 'Rice'}</td>
                <td><span class="status-badge ${item.available ? 'status-available' : 'status-unavailable'}">${item.available ? 'Available' : 'Unavailable'}</span></td>
                <td>
                    <button class="action-btn-sm btn-edit" onclick="editDish('${item.id}')">Edit</button>
                    <button class="action-btn-sm btn-toggle" onclick="toggleAvailability('${item.id}', ${!item.available})">${item.available ? 'Disable' : 'Enable'}</button>
                    <button class="action-btn-sm btn-delete" onclick="deleteDish('${item.id}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }
    
    async function loadOffers() {
        const snapshot = await db.collection('offers').get();
        offers = [];
        snapshot.forEach(doc => offers.push({ id: doc.id, ...doc.data() }));
        renderOffersTable();
    }
    
    function renderOffersTable() {
        const tbody = document.getElementById('offersTableBody');
        if (offers.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No offers</td></tr>'; return; }
        tbody.innerHTML = offers.map(offer => `
            <tr>
                <td>${offer.title || 'Offer'}</td>
                <td>${offer.value}% OFF</td>
                <td><span class="status-badge ${offer.active ? 'status-available' : 'status-unavailable'}">${offer.active ? 'Active' : 'Inactive'}</span></td>
                <td>
                    <button class="action-btn-sm btn-toggle" onclick="toggleOffer('${offer.id}', ${!offer.active})">${offer.active ? 'Deactivate' : 'Activate'}</button>
                    <button class="action-btn-sm btn-delete" onclick="deleteOffer('${offer.id}')">Delete</button>
                </td>
            </tr>
        `).join('');
    }
    
    function updateOfferItems() {
        const select = document.getElementById('offerItem');
        if (select) select.innerHTML = '<option value="all">All Items</option>' + menuItems.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
    }
    
    function openAddDishModal() { 
        document.getElementById('dishModalTitle').innerText = 'Add New Dish'; 
        document.getElementById('dishId').value = ''; 
        document.getElementById('dishName').value = ''; 
        document.getElementById('dishPrice').value = ''; 
        document.getElementById('dishCategory').value = 'tiffin'; 
        document.getElementById('dishEmoji').value = '🍽️'; 
        document.getElementById('dishModal').style.display = 'flex'; 
    }
    
    function editDish(id) { 
        const item = menuItems.find(i => i.id === id); 
        if(item){ 
            document.getElementById('dishModalTitle').innerText = 'Edit Dish'; 
            document.getElementById('dishId').value = id; 
            document.getElementById('dishName').value = item.name; 
            document.getElementById('dishPrice').value = item.price; 
            document.getElementById('dishCategory').value = item.category; 
            document.getElementById('dishEmoji').value = item.emoji || '🍽️'; 
            document.getElementById('dishModal').style.display = 'flex'; 
        } 
    }
    
    async function saveDish() { 
        const id = document.getElementById('dishId').value; 
        const data = { name: document.getElementById('dishName').value, price: parseFloat(document.getElementById('dishPrice').value), category: document.getElementById('dishCategory').value, emoji: document.getElementById('dishEmoji').value, approved: true, available: true }; 
        if (id) await db.collection('menu').doc(id).update(data); 
        else await db.collection('menu').add(data); 
        closeDishModal(); loadMenu(); showToast('Dish saved!'); 
    }
    
    async function toggleAvailability(id, status) { await db.collection('menu').doc(id).update({ available: status }); loadMenu(); showToast(status ? 'Available' : 'Unavailable'); }
    async function deleteDish(id) { if(confirm('Delete this dish?')){ await db.collection('menu').doc(id).delete(); loadMenu(); showToast('Deleted'); } }
    function closeDishModal() { document.getElementById('dishModal').style.display = 'none'; }
    
    async function saveOffer() { 
        const data = { title: document.getElementById('offerTitle').value || 'Special Offer', type: 'percentage', value: parseFloat(document.getElementById('offerValue').value), itemId: document.getElementById('offerItem').value, active: true }; 
        await db.collection('offers').add(data); closeOfferModal(); loadOffers(); showToast('Offer added!'); 
    }
    async function toggleOffer(id, status) { await db.collection('offers').doc(id).update({ active: status }); loadOffers(); showToast(status ? 'Activated' : 'Deactivated'); }
    async function deleteOffer(id) { if(confirm('Delete?')){ await db.collection('offers').doc(id).delete(); loadOffers(); showToast('Deleted'); } }
    function closeOfferModal() { document.getElementById('offerModal').style.display = 'none'; }
    
    // UTR Verification Functions
    function getPaymentStatusBadge(status) {
        if (status === 'PENDING_VERIFICATION') return { class: 'badge-pending', text: '⏳ Pending Verification' };
        if (status === 'VERIFIED') return { class: 'badge-verified', text: '✅ Payment Verified' };
        if (status === 'REJECTED') return { class: 'badge-rejected', text: '❌ Payment Rejected' };
        return { class: 'badge-pending', text: '⏳ Pending' };
    }
    
    function getOrderTypeText(type) {
        const map = { 'dinein': '🏠 Dine In', 'pickup': '🚗 Pickup', 'parcel': '📦 Parcel' };
        return map[type] || type;
    }
    
    async function verifyPayment(orderId, utrNumber) {
    console.log("Verifying order ID:", orderId);
    console.log("UTR Number:", utrNumber);
    
    try {
        // First check if document exists
        const docRef = db.collection('orders').doc(orderId);
        const docSnap = await docRef.get();
        
        if (!docSnap.exists) {
            console.error("Document does not exist:", orderId);
            showToast('❌ Order not found! ID: ' + orderId, true);
            return;
        }
        
        console.log("Document found, updating...");
        
        await docRef.update({ 
            paymentStatus: 'VERIFIED', 
            orderStatus: 'confirmed',
            status: 'booked',
            verifiedAt: new Date().toISOString(),
            verifiedBy: 'Admin'
        });
        
        showToast(`✅ Payment verified! Order confirmed.`);
        playSound();
        
    } catch(e) { 
        console.error("Verification error:", e);
        showToast('Verification failed: ' + e.message, true); 
    }
}
    
    async function rejectPayment(orderId) {
        if(confirm('Reject this payment? Order will be cancelled.')) {
            await db.collection('orders').doc(orderId).update({ 
                paymentStatus: 'REJECTED', 
                orderStatus: 'cancelled',
                status: 'cancelled'
            });
            showToast(`❌ Payment rejected. Order cancelled.`);
        }
    }
    
    function startListening() {
        if (unsubscribeOrders) unsubscribeOrders();
        unsubscribeOrders = db.collection('orders').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
            const orders = [];
            snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
            allOrders = orders;
            renderPendingVerifications(orders);
            renderAllOrders(orders);
            updateVerificationStats(orders);
            if (window.lastOrderCount && orders.length > window.lastOrderCount) { playSound(); showToast(`🔔 New order received!`); }
            window.lastOrderCount = orders.length;
        });
    }
    
    function renderPendingVerifications(orders) {
        const pending = orders.filter(o => o.paymentStatus === 'PENDING_VERIFICATION');
        const container = document.getElementById('verificationContainer');
        if (pending.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px;">No pending verifications</div>'; return; }
        container.innerHTML = pending.map(order => `
            <div class="order-card pending">
                <div class="order-header">
                    <div class="order-id">${order.id}</div>
                    <div class="badges">
                        <span class="badge badge-pending">⏳ Pending Verification</span>
                        <span class="badge">💰 ${order.payMethod || 'UPI'}</span>
                    </div>
                </div>
                <div><strong>👤 ${order.customerName}</strong> | 🕐 ${order.time} | 📅 ${order.date}</div>
                <div class="order-items">${order.items ? order.items.map(i => `${i.name} × ${i.qty} — ₹${i.price}`).join('<br>') : ''}</div>
                <div class="utr-box"><strong>🔐 UTR Number:</strong> ${order.utrNumber || 'N/A'}</div>
                <div class="order-footer">
                    <div class="order-total">₹${(order.total || 0).toFixed(2)}</div>
                    <div><strong>Type:</strong> ${getOrderTypeText(order.orderType)}</div>
                </div>
                <div class="action-buttons">
                    <button class="verify-btn" onclick="verifyPayment('${order.id}', '${order.utrNumber}')">✅ Verify Payment</button>
                    <button class="reject-btn" onclick="rejectPayment('${order.id}')">❌ Reject Payment</button>
                </div>
            </div>
        `).join('');
    }
    
    function renderAllOrders(orders) {
        const container = document.getElementById('allOrdersContainer');
        if (orders.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px;">No orders</div>'; return; }
        container.innerHTML = orders.map(order => {
            const paymentStatus = getPaymentStatusBadge(order.paymentStatus);
            return `<div class="order-card ${order.paymentStatus === 'VERIFIED' ? 'verified' : (order.paymentStatus === 'REJECTED' ? 'rejected' : 'pending')}">
                <div class="order-header">
                    <div class="order-id">${order.id}</div>
                    <div class="badges">
                        <span class="badge ${paymentStatus.class}">${paymentStatus.text}</span>
                        <span class="badge">💰 ${order.payMethod || 'UPI'}</span>
                        <span class="badge">${getOrderTypeText(order.orderType)}</span>
                    </div>
                </div>
                <div><strong>👤 ${order.customerName}</strong> | 🕐 ${order.time} | 📅 ${order.date}</div>
                <div class="order-items">${order.items ? order.items.map(i => `${i.name} × ${i.qty} — ₹${i.price}`).join('<br>') : ''}</div>
                <div class="order-footer">
                    <div class="order-total">₹${(order.total || 0).toFixed(2)}</div>
                    ${order.utrNumber ? `<div style="font-size:11px;">UTR: ${order.utrNumber}</div>` : ''}
                </div>
            </div>`;
        }).join('');
    }
    
    function updateVerificationStats(orders) {
        const pending = orders.filter(o => o.paymentStatus === 'PENDING_VERIFICATION');
        const today = new Date().toLocaleDateString('en-IN');
        const verifiedToday = orders.filter(o => o.paymentStatus === 'VERIFIED' && o.date === today);
        const pendingAmount = pending.reduce((sum, o) => sum + (o.total || 0), 0);
        document.getElementById('pendingCount').innerText = pending.length;
        document.getElementById('verifiedToday').innerText = verifiedToday.length;
        document.getElementById('pendingAmount').innerHTML = '₹' + pendingAmount.toFixed(2);
    }
    
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => { 
        btn.addEventListener('click', () => { 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active')); 
            btn.classList.add('active'); 
            document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active'); 
        }); 
    });
</script>
</body>
</html>
